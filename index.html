<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Qadha Tracker</title>
  
  <!-- iOS Web App Settings -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Qadha">
  <link rel="apple-touch-icon" href="https://fav.farm/🤲">

  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-variant-numeric: tabular-nums; /* Prevents text jump when numbers change */
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100vh;
      height: 100dvh;
      overflow: hidden; /* Lock viewport completely */
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
    }

    header {
      text-align: center;
      width: 100%;
      max-width: 480px;
      padding-bottom: 4px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .tracker-list {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1; /* Automatically stretches cards to fit exact screen height */
      margin: 6px 0;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 0 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex: 1; /* Distributes vertical space evenly across 6 cards */
      min-height: 52px;
    }

    .prayer-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .prayer-name {
      font-size: 1rem;
      font-weight: 600;
      width: 60px; /* Fixed width prevents shifting */
    }

    .prayer-counts {
      display: flex;
      flex-direction: column;
      min-width: 85px; /* Fixed width prevents shifting */
    }

    .prayer-remaining {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent);
    }

    .prayer-completed {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* iOS-Friendly 44px Target Buttons */
    .btn-undo-icon {
      background-color: rgba(245, 158, 11, 0.12);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.35);
      border-radius: 10px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s ease, background-color 0.15s ease;
    }

    .btn-undo-icon:active {
      transform: scale(0.92);
      background-color: rgba(245, 158, 11, 0.25);
    }

    .btn-undo-icon:disabled {
      opacity: 0.2;
      cursor: not-allowed;
      border-color: transparent;
      background-color: transparent;
      color: var(--text-muted);
    }

    .btn-done {
      background-color: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      height: 44px;
      padding: 0 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s ease, background-color 0.15s ease;
    }

    .btn-done:active {
      transform: scale(0.95);
      background-color: var(--accent-hover);
    }

    .actions {
      width: 100%;
      max-width: 480px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .btn-secondary {
      background-color: var(--card-bg);
      color: var(--text-muted);
      border: 1px solid #334155;
      border-radius: 10px;
      height: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }

    .btn-danger {
      color: var(--danger);
      border-color: #7f1d1d;
    }

    input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>Qadha Tracker</h1>
    <p class="subtitle">Saved locally on device</p>
  </header>

  <div class="tracker-list" id="trackerList">
    <!-- Dynamic Prayer Cards -->
  </div>

  <div class="actions">
    <button class="btn-secondary" onclick="exportData()">Export</button>
    <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">Import</button>
    <button class="btn-secondary btn-danger" onclick="resetData()">Reset</button>
    <input type="file" id="fileInput" accept=".json" onchange="importData(event)">
  </div>

  <script>
    const initialPrayers = [
      { name: "Fajr", remaining: 2121, completed: 0 },
      { name: "Dhuhr", remaining: 2063, completed: 0 },
      { name: "Asr", remaining: 2063, completed: 0 },
      { name: "Maghrib", remaining: 709, completed: 0 },
      { name: "Isha", remaining: 1764, completed: 0 },
      { name: "Witr", remaining: 1764, completed: 0 }
    ];

    let prayers = [];

    function loadData() {
      const saved = localStorage.getItem("qadha_data");
      if (saved) {
        try {
          prayers = JSON.parse(saved);
        } catch (e) {
          prayers = JSON.parse(JSON.stringify(initialPrayers));
        }
      } else {
        prayers = JSON.parse(JSON.stringify(initialPrayers));
      }
      render();
    }

    function saveData() {
      localStorage.setItem("qadha_data", JSON.stringify(prayers));
    }

    function logPrayer(index) {
      if (prayers[index].remaining > 0) {
        prayers[index].remaining -= 1;
        prayers[index].completed += 1;
        saveData();
        render();
      }
    }

    function undoPrayer(index) {
      if (prayers[index].completed > 0) {
        prayers[index].remaining += 1;
        prayers[index].completed -= 1;
        saveData();
        render();
      }
    }

    function render() {
      const container = document.getElementById("trackerList");
      container.innerHTML = "";

      prayers.forEach((prayer, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="prayer-info">
            <div class="prayer-name">${prayer.name}</div>
            <div class="prayer-counts">
              <span class="prayer-remaining">${prayer.remaining.toLocaleString()} left</span>
              <span class="prayer-completed">${prayer.completed.toLocaleString()} completed</span>
            </div>
          </div>
          <div class="card-actions">
            <button class="btn-undo-icon" onclick="undoPrayer(${index})" ${prayer.completed === 0 ? 'disabled' : ''} aria-label="Undo ${prayer.name}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 7v6h6"/>
                <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
              </svg>
            </button>
            <button class="btn-done" onclick="logPrayer(${index})">+1 Done</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    async function exportData() {
      const jsonStr = JSON.stringify(prayers, null, 2);
      const dateStr = new Date().toISOString().slice(0, 10);
      const filename = `qadha_backup_${dateStr}.json`;

      // Solution 1: Use iOS Native Share Sheet if available (allows overwriting directly in Files app)
      const file = new File([jsonStr], "qadha_backup.json", { type: 'application/json' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: 'Qadha Backup'
          });
          return;
        } catch (err) {
          if (err.name === 'AbortError') return; // User canceled share
        }
      }

      // Solution 2: Fallback download with timestamp to avoid (1) duplicate appending
      const blob = new Blob([jsonStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);
          if (Array.isArray(imported)) {
            prayers = imported;
            saveData();
            render();
            alert("Backup restored successfully!");
          } else {
            alert("Invalid backup file format.");
          }
        } catch (err) {
          alert("Error reading backup file.");
        }
      };
      reader.readAsText(file);
    }

    function resetData() {
      if (confirm("Are you sure you want to reset all counts to default?")) {
        prayers = JSON.parse(JSON.stringify(initialPrayers));
        saveData();
        render();
      }
    }

    loadData();
  </script>

</body>
</html>
