<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Qadha Tracker</title>
  
  <!-- iOS Web App Settings (Full Screen Mode) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Qadha">
  <link rel="apple-touch-icon" href="https://fav.farm/🤲">

  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      padding: 24px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .tracker-list {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .prayer-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .prayer-name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .prayer-remaining {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
    }

    .prayer-completed {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .btn-done {
      background-color: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s ease, background-color 0.15s ease;
    }

    .btn-done:active {
      transform: scale(0.95);
      background-color: var(--accent-hover);
    }

    .actions {
      margin-top: 28px;
      width: 100%;
      max-width: 480px;
      display: flex;
      gap: 10px;
    }

    .btn-secondary {
      flex: 1;
      background-color: var(--card-bg);
      color: var(--text-muted);
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
    }

    .btn-danger {
      color: var(--danger);
      border-color: #7f1d1d;
    }

    input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>Qadha Tracker</h1>
    <p class="subtitle">Saved locally on your device</p>
  </header>

  <div class="tracker-list" id="trackerList">
    <!-- Dynamic Cards -->
  </div>

  <div class="actions">
    <button class="btn-secondary" onclick="exportData()">Export Backup</button>
    <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">Import Backup</button>
    <button class="btn-secondary btn-danger" onclick="resetData()">Reset</button>
    <input type="file" id="fileInput" accept=".json" onchange="importData(event)">
  </div>

  <script>
    const initialPrayers = [
      { name: "Fajr", remaining: 2121, completed: 0 },
      { name: "Dhuhr", remaining: 2063, completed: 0 },
      { name: "Asr", remaining: 2063, completed: 0 },
      { name: "Maghrib", remaining: 709, completed: 0 },
      { name: "Isha", remaining: 1764, completed: 0 },
      { name: "Witr", remaining: 1764, completed: 0 }
    ];

    let prayers = [];

    function loadData() {
      const saved = localStorage.getItem("qadha_data");
      if (saved) {
        try {
          prayers = JSON.parse(saved);
        } catch (e) {
          prayers = JSON.parse(JSON.stringify(initialPrayers));
        }
      } else {
        prayers = JSON.parse(JSON.stringify(initialPrayers));
      }
      render();
    }

    function saveData() {
      localStorage.setItem("qadha_data", JSON.stringify(prayers));
    }

    function logPrayer(index) {
      if (prayers[index].remaining > 0) {
        prayers[index].remaining -= 1;
        prayers[index].completed += 1;
        saveData();
        render();
      }
    }

    function render() {
      const container = document.getElementById("trackerList");
      container.innerHTML = "";

      prayers.forEach((prayer, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="prayer-info">
            <div class="prayer-name">${prayer.name}</div>
            <div class="prayer-remaining">${prayer.remaining.toLocaleString()} left</div>
            <div class="prayer-completed">${prayer.completed.toLocaleString()} completed</div>
          </div>
          <button class="btn-done" onclick="logPrayer(${index})">+1 Done</button>
        `;
        container.appendChild(card);
      });
    }

    function exportData() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(prayers, null, 2));
      const dlAnchor = document.createElement('a');
      dlAnchor.setAttribute("href", dataStr);
      dlAnchor.setAttribute("download", "qadha_backup.json");
      document.body.appendChild(dlAnchor);
      dlAnchor.click();
      dlAnchor.remove();
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);
          if (Array.isArray(imported)) {
            prayers = imported;
            saveData();
            render();
            alert("Backup restored successfully!");
          } else {
            alert("Invalid backup file format.");
          }
        } catch (err) {
          alert("Error reading backup file.");
        }
      };
      reader.readAsText(file);
    }

    function resetData() {
      if (confirm("Are you sure you want to reset all counts to default?")) {
        prayers = JSON.parse(JSON.stringify(initialPrayers));
        saveData();
        render();
      }
    }

    loadData();
  </script>

</body>
</html>
