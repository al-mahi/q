<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Qadha Tracker</title>
  
  <!-- iOS Web App Settings (Full Screen Mode) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Qadha">
  <link rel="apple-touch-icon" href="https://fav.farm/🤲">

  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100vh;
      height: 100dvh;
      overflow: hidden; /* Lock scrolling */
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
    }

    header {
      text-align: center;
      margin-bottom: 4px;
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .tracker-list {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      justify-content: center;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .prayer-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .prayer-name {
      font-size: 0.95rem;
      font-weight: 600;
      width: 58px;
    }

    .prayer-counts {
      display: flex;
      flex-direction: column;
    }

    .prayer-remaining {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent);
    }

    .prayer-completed {
      font-size: 0.68rem;
      color: var(--text-muted);
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-undo-icon {
      background-color: rgba(245, 158, 11, 0.12);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 8px;
      padding: 7px 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.15s ease;
    }

    .btn-undo-icon:active {
      transform: scale(0.9);
      background-color: rgba(245, 158, 11, 0.25);
    }

    .btn-undo-icon:disabled {
      opacity: 0.25;
      cursor: not-allowed;
      border-color: transparent;
      background-color: transparent;
      color: var(--text-muted);
    }

    .btn-done {
      background-color: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s ease, background-color 0.15s ease;
    }

    .btn-done:active {
      transform: scale(0.95);
      background-color: var(--accent-hover);
    }

    .actions {
      margin-top: 6px;
      width: 100%;
      max-width: 420px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .btn-secondary {
      background-color: var(--card-bg);
      color: var(--text-muted);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 2px;
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
    }

    .btn-danger {
      color: var(--danger);
      border-color: #7f1d1d;
    }

    input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>Qadha Tracker</h1>
    <p class="subtitle">Saved locally on device</p>
  </header>

  <div class="tracker-list" id="trackerList">
    <!-- Dynamic Cards -->
  </div>

  <div class="actions">
    <button class="btn-secondary" onclick="exportData()">Export</button>
    <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">Import</button>
    <button class="btn-secondary btn-danger" onclick="resetData()">Reset</button>
    <input type="file" id="fileInput" accept=".json" onchange="importData(event)">
  </div>

  <script>
    const initialPrayers = [
      { name: "Fajr", remaining: 2121, completed: 0 },
      { name: "Dhuhr", remaining: 2063, completed: 0 },
      { name: "Asr", remaining: 2063, completed: 0 },
      { name: "Maghrib", remaining: 709, completed: 0 },
      { name: "Isha", remaining: 1764, completed: 0 },
      { name: "Witr", remaining: 1764, completed: 0 }
    ];

    let prayers = [];

    function loadData() {
      const saved = localStorage.getItem("qadha_data");
      if (saved) {
        try {
          prayers = JSON.parse(saved);
        } catch (e) {
          prayers = JSON.parse(JSON.stringify(initialPrayers));
        }
      } else {
        prayers = JSON.parse(JSON.stringify(initialPrayers));
      }
      render();
    }

    function saveData() {
      localStorage.setItem("qadha_data", JSON.stringify(prayers));
    }

    function logPrayer(index) {
      if (prayers[index].remaining > 0) {
        prayers[index].remaining -= 1;
        prayers[index].completed += 1;
        saveData();
        render();
      }
    }

    function undoPrayer(index) {
      if (prayers[index].completed > 0) {
        prayers[index].remaining += 1;
        prayers[index].completed -= 1;
        saveData();
        render();
      }
    }

    function render() {
      const container = document.getElementById("trackerList");
      container.innerHTML = "";

      prayers.forEach((prayer, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="prayer-info">
            <div class="prayer-name">${prayer.name}</div>
            <div class="prayer-counts">
              <span class="prayer-remaining">${prayer.remaining.toLocaleString()} left</span>
              <span class="prayer-completed">${prayer.completed.toLocaleString()} completed</span>
            </div>
          </div>
          <div class="card-actions">
            <button class="btn-undo-icon" onclick="undoPrayer(${index})" ${prayer.completed === 0 ? 'disabled' : ''} title="Undo ${prayer.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 7v6h6"/>
                <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
              </svg>
            </button>
            <button class="btn-done" onclick="logPrayer(${index})">+1 Done</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function exportData() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(prayers, null, 2));
      const dlAnchor = document.createElement('a');
      dlAnchor.setAttribute("href", dataStr);
      dlAnchor.setAttribute("download", "qadha_backup.json");
      document.body.appendChild(dlAnchor);
      dlAnchor.click();
      dlAnchor.remove();
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);
          if (Array.isArray(imported)) {
            prayers = imported;
            saveData();
            render();
            alert("Backup restored!");
          } else {
            alert("Invalid backup file.");
          }
        } catch (err) {
          alert("Error reading file.");
        }
      };
      reader.readAsText(file);
    }

    function resetData() {
      if (confirm("Reset all counts to default?")) {
        prayers = JSON.parse(JSON.stringify(initialPrayers));
        saveData();
        render();
      }
    }

    loadData();
  </script>

</body>
</html>
